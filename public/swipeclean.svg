<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <clipPath id="photoClip">
      <rect x="90" y="110" width="200" height="260" rx="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Back card (tilted right - discard) -->
  <g transform="translate(280, 240) rotate(12)" filter="url(#shadow)">
    <rect x="-90" y="-120" width="180" height="240" rx="18" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
    <!-- X mark -->
    <g stroke="#ef4444" stroke-width="6" stroke-linecap="round" opacity="0.6">
      <line x1="-20" y1="-20" x2="20" y2="20"/>
      <line x1="20" y1="-20" x2="-20" y2="20"/>
    </g>
  </g>

  <!-- Middle card (slight tilt) -->
  <g transform="translate(250, 250) rotate(-3)" filter="url(#shadow)">
    <rect x="-100" y="-130" width="200" height="260" rx="20" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
    <!-- Mountain landscape -->
    <rect x="-80" y="-110" width="160" height="200" rx="10" fill="#e2e8f0"/>
    <circle cx="-30" cy="-60" r="18" fill="#fbbf24"/>
    <polygon points="-80,90 -20,10 20,50 80,0 80,90" fill="#86efac" opacity="0.8"/>
    <polygon points="-40,90 10,-10 60,50 80,90" fill="#22c55e" opacity="0.7"/>
  </g>

  <!-- Front card (being swiped right - keep!) -->
  <g transform="translate(210, 235) rotate(-8)" filter="url(#shadow)">
    <rect x="-105" y="-135" width="210" height="270" rx="22" fill="white"/>
    <!-- Photo content -->
    <rect x="-85" y="-115" width="170" height="210" rx="12" fill="#dbeafe"/>
    <circle cx="-30" cy="-65" r="20" fill="#fcd34d"/>
    <polygon points="-85,95 -25,-5 15,45 85,-10 85,95" fill="#93c5fd" opacity="0.9"/>
    <polygon points="-45,95 20,-30 85,55 85,95" fill="#3b82f6" opacity="0.7"/>
    <!-- Keep check badge -->
    <circle cx="75" cy="-105" r="28" fill="#10b981"/>
    <path d="M62,-108 L72,-98 L90,-116" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Swipe arrow indicator -->
  <g transform="translate(370, 360)" opacity="0.9">
    <path d="M0,0 C20,-15 40,-15 55,0" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
    <polygon points="55,-8 65,0 55,8" fill="white"/>
  </g>

  <!-- Sparkle effects -->
  <g fill="white" opacity="0.7">
    <circle cx="400" cy="100" r="4"/>
    <circle cx="420" cy="130" r="2.5"/>
    <circle cx="380" cy="80" r="3"/>
    <!-- Star sparkle -->
    <path d="M430,90 L433,82 L436,90 L444,87 L436,90 L433,98 L430,90 L422,87 Z" opacity="0.5"/>
  </g>

  <!-- Shine overlay -->
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>
</svg>
