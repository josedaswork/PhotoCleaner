name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fix permissions
        run: chmod +x node_modules/.bin/*

      - name: Build web app
        run: npm run build

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Add storage permissions
        run: |
          # Add READ_MEDIA_IMAGES (Android 13+) and READ_EXTERNAL_STORAGE (older) permissions
          sed -i '/<\/manifest>/i \
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />' \
            android/app/src/main/AndroidManifest.xml

      - name: Set custom app icon
        run: |
          # Copy adaptive icon layers to drawable
          cp resources/android/ic_launcher_background.xml android/app/src/main/res/drawable/ic_launcher_background.xml
          cp resources/android/ic_launcher_foreground.xml android/app/src/main/res/drawable/ic_launcher_foreground.xml
          # Copy adaptive icon definition to mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          cp resources/android/ic_launcher.xml android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          cp resources/android/ic_launcher.xml android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SwipeClean-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
