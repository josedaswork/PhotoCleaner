name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fix permissions
        run: chmod +x node_modules/.bin/*

      - name: Build web app
        run: npm run build

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Add storage permissions
        run: |
          # Add READ_MEDIA_IMAGES (Android 13+) and READ_EXTERNAL_STORAGE (older) permissions
          sed -i '/<\/manifest>/i \
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />' \
            android/app/src/main/AndroidManifest.xml

      - name: Add DirectoryPicker plugin
        run: |
          PKG="android/app/src/main/java/com/swipeclean/app"
          cp resources/android/DirectoryPickerPlugin.java $PKG/DirectoryPickerPlugin.java

          # Register plugin in MainActivity
          sed -i '/import android.os.Bundle;/a import com.swipeclean.app.DirectoryPickerPlugin;' $PKG/MainActivity.java
          sed -i '/super.onCreate/a \        registerPlugin(DirectoryPickerPlugin.class);' $PKG/MainActivity.java

      - name: Set custom app icon
        run: |
          RES="android/app/src/main/res"

          # Remove all default PNG launcher icons
          find $RES/mipmap-* -name "ic_launcher*.png" -delete 2>/dev/null || true
          find $RES/mipmap-* -name "ic_launcher*.webp" -delete 2>/dev/null || true

          # Copy vector drawable layers
          cp resources/android/ic_launcher_background.xml $RES/drawable/ic_launcher_background.xml
          cp resources/android/ic_launcher_foreground.xml $RES/drawable/ic_launcher_foreground.xml

          # Copy adaptive icon definition to mipmap-anydpi-v26
          mkdir -p $RES/mipmap-anydpi-v26
          cp resources/android/ic_launcher.xml $RES/mipmap-anydpi-v26/ic_launcher.xml
          cp resources/android/ic_launcher.xml $RES/mipmap-anydpi-v26/ic_launcher_round.xml

          # Also add to drawable-v24 as fallback
          mkdir -p $RES/drawable-v24
          cp resources/android/ic_launcher_foreground.xml $RES/drawable-v24/ic_launcher_foreground.xml

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SwipeClean-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
